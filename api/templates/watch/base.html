{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <noscript><meta http-equiv="refresh" content="{{ refresh_secs|default:30 }}"></noscript>
  <title>{% block title %}Live Leaderboard{% endblock %}</title>
  <style>
    :root {
      --bg:       #f8faf6;
      --fg:       #1f2419;
      --muted:   #5a6356;
      --border:  #d6dad0;
      --card:    #ffffff;
      --primary: #2e7d32;
      --t1-bg:   #fff1e1;  /* default; overridden inline when teams have colour */
      --t1-fg:   #b25400;
      --t2-bg:   #e7ecf6;
      --t2-fg:   #1a3a8e;
      --halved:  #eceee8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #131613;
        --fg:    #e6ebe1;
        --muted: #98a08e;
        --border:#2a2f27;
        --card:  #1c211b;
        --halved:#252924;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      font-size: 15px; line-height: 1.35;
    }
    .wrap   { max-width: 720px; margin: 0 auto; padding: 16px; }
    h1      { font-size: 18px; margin: 0 0 4px 0; }
    .sub    { color: var(--muted); font-size: 12px; margin: 0 0 14px 0; }
    .card   {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; margin: 0 0 12px 0;
    }
    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 8px;
    }
    .team-name { font-weight: 700; }
    .team-pts  { font-size: 32px; font-weight: 800; line-height: 1; }
    .dash      { color: var(--muted); font-weight: 700; }
    .t1-name { color: var(--t1-fg); }
    .t2-name { color: var(--t2-fg); }
    .total   { text-align: center; color: var(--muted); font-size: 11px; margin-top: 4px; }
    .match-card .match-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .match-card .game-label {
      font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .match-card .group-label {
      font-size: 12px; font-weight: 600;
    }
    .lineup { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; align-items: center; margin: 4px 0 8px; }
    .lineup .vs { color: var(--muted); font-size: 12px; }
    .lineup .t1-side { text-align: left; }
    .lineup .t2-side { text-align: right; }
    .seg-row {
      display: grid; grid-template-columns: auto 1fr auto auto;
      gap: 8px; align-items: center;
      padding: 4px 0;
      border-top: 1px solid var(--border);
    }
    .seg-row:first-child { border-top: none; }
    .seg-label { font-size: 12px; color: var(--muted); min-width: 56px; }
    .seg-result {
      font-size: 12px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .result-t1 { background: var(--t1-bg); color: var(--t1-fg); }
    .result-t2 { background: var(--t2-bg); color: var(--t2-fg); }
    .result-halved { background: var(--halved); color: var(--muted); }
    .result-pending { color: var(--muted); font-style: italic; font-size: 12px; }
    .live-text     { color: var(--muted); font-size: 12px; margin-left: 6px; }
    .pts { font-variant-numeric: tabular-nums; font-size: 12px; min-width: 28px; text-align: right; }
    .pts.t1 { color: var(--t1-fg); }
    .pts.t2 { color: var(--t2-fg); }
    .empty {
      text-align: center; padding: 40px 8px; color: var(--muted);
    }
    .footer {
      margin-top: 16px; color: var(--muted); font-size: 11px;
      text-align: center;
      display: flex; justify-content: center; align-items: center;
      gap: 8px; flex-wrap: wrap;
    }
    .refresh-btn {
      appearance: none;
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
    }
    .refresh-btn:active { transform: translateY(1px); }
    .tabnav {
      display: flex; gap: 4px; margin: 0 0 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .tabnav a {
      flex: 1; text-align: center;
      padding: 8px 6px; font-size: 13px; font-weight: 600;
      color: var(--muted); text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tabnav a.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .lb-table {
      width: 100%; border-collapse: collapse;
    }
    .lb-table th, .lb-table td {
      padding: 6px 8px; text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .lb-table th {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.4px;
      font-weight: 600;
    }
    .lb-table td.num, .lb-table th.num {
      text-align: right; font-variant-numeric: tabular-nums;
    }
    .lb-table tr:last-child td { border-bottom: none; }
    .matchup-head {
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 8px; align-items: center;
      padding: 8px 0 2px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .match-card .matchup-head:first-of-type { border-top: none; }
    .matchup-players { font-weight: 600; }
    .vs-sep         { color: var(--muted); font-weight: normal; margin: 0 4px; }
    .seg-row.sub-row {
      padding-left: 14px; border-top: none;
    }
    .seg-row.sub-row .seg-label { min-width: 40px; }

    /* ── Cup-name pill + big colored team scoreboard ─────────────────── */
    .cup-pill-row    { text-align: center; margin: 0 0 8px 0; }
    .cup-name-pill   {
      display: inline-block;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 14px; border-radius: 14px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.6px;
    }
    .cup-board {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      border-radius: 10px; overflow: hidden;
      margin: 0 0 6px 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .cup-team {
      padding: 14px 12px 16px; text-align: center;
      color: #fff; min-height: 92px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .cup-team-1 { background: var(--t1-fg); }
    .cup-team-2 { background: var(--t2-fg); }
    .cup-team-label {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.6px; text-transform: uppercase;
      opacity: 0.92;
    }
    .cup-team-pts {
      font-size: 44px; font-weight: 900; line-height: 1;
      margin-top: 6px;
    }
    .cup-need {
      text-align: center; color: var(--muted);
      font-size: 12px; margin: 4px 0 8px 0;
    }

    /* ── LIVE NOW section divider ────────────────────────────────────── */
    .section-divider {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: center;
      margin: 16px 0 10px;
    }
    .section-divider::before,
    .section-divider::after {
      content: ''; height: 1px; background: var(--border);
    }
    .section-divider span {
      color: var(--muted); font-size: 11px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
    }

    /* ── Match card head: game pill + meta line ──────────────────────── */
    .match-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; flex-wrap: wrap;
    }
    .game-pill {
      display: inline-block; padding: 4px 12px;
      background: var(--halved); color: var(--fg);
      border-radius: 14px;
      font-size: 12px; font-weight: 700;
    }
    .meta-text { color: var(--muted); font-size: 12px; }

    /* ── Matchup header (Singles Nassau): P1 / vs+thru / P2 ──────────── */
    .matchup-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 8px; align-items: center;
      padding: 10px 0 6px;
      border-top: 1px solid var(--border);
    }
    .match-card .matchup-row:first-of-type { border-top: 1px solid var(--border); }
    .matchup-row .p1 { text-align: right; font-weight: 700; font-size: 14px; }
    .matchup-row .p2 { text-align: left;  font-weight: 700; font-size: 14px; }
    .matchup-row .vs-info {
      text-align: center; color: var(--muted); font-size: 11px;
      line-height: 1.3;
    }
    .matchup-row .vs-info em { font-style: italic; }

    /* ── Result line: label | t1-chip | center | t2-chip ──────────────
       The middle column is `auto` so it shrinks to a 1px divider when
       neither side has a centered chip, and grows to fit "All Square"
       / "Halved" badges — landing them at the geometric centre of the
       row regardless of which side carries the team chip. */
    .result-line {
      display: grid;
      grid-template-columns: 40px 1fr auto 1fr;
      gap: 8px; align-items: center;
      padding: 6px 0;
    }
    .result-line .lbl {
      font-size: 12px; color: var(--muted);
    }
    .result-line .lbl-wide {
      grid-column: 1 / 2; font-size: 13px;
    }
    .result-line .lbl-wide .muted { color: var(--muted); margin: 0 4px; }
    .result-line .t1-cell { text-align: right; }
    .result-line .t2-cell { text-align: left;  }
    .result-line .center-cell {
      display: flex; justify-content: center; align-items: center;
    }
    .result-line .v-div   { background: var(--border); height: 22px; width: 1px; }
    .result-line .chip-empty {
      color: var(--muted); font-size: 14px; padding: 0 8px;
    }

    .chip {
      display: inline-block; padding: 4px 10px;
      border-radius: 14px;
      font-size: 12px; font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip-t1 { background: var(--t1-bg); color: var(--t1-fg); }
    .chip-t2 { background: var(--t2-bg); color: var(--t2-fg); }
    .chip-halved {
      background: var(--halved); color: var(--muted);
      border-color: var(--border);
    }

    /* ── Casual game leaderboard rows (Skins / Multi-Skins) ─────────── */
    .lb-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px; align-items: center;
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }
    .lb-row:first-of-type { border-top: none; }
    .lb-row .name    { font-weight: 600; font-size: 14px; }
    .lb-row .detail  { color: var(--muted); font-size: 12px; }
    .lb-row .payout  {
      font-variant-numeric: tabular-nums; font-weight: 700;
      font-size: 14px; min-width: 56px; text-align: right;
    }
    .game-meta-line {
      color: var(--muted); font-size: 12px;
      margin: 4px 0 8px 0;
    }
    .pool-pill {
      display: inline-block; padding: 2px 8px;
      background: var(--primary); color: #fff;
      border-radius: 12px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* ── Multi-Skins scorecard grid (gross + skin-winner highlight) ── */
    .ms-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -14px;       /* let the table bleed to the card edges */
      padding: 0 14px 4px;
    }
    .ms-card {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-variant-numeric: tabular-nums;
    }
    .ms-card th, .ms-card td {
      padding: 4px 0;
      text-align: center;
      font-size: 11px;
      border-bottom: 1px solid var(--border);
      min-width: 26px;
    }
    .ms-card .ms-name {
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      padding-right: 8px;
      min-width: 72px;
      position: sticky; left: 0;
      background: var(--card);
      z-index: 1;
    }
    .ms-card .ms-name .phcp {
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
      margin-left: 2px;
    }
    .ms-card thead th.ms-name { z-index: 2; }
    .ms-card .ms-par {
      font-style: italic;
      color: var(--muted);
    }
    .ms-card thead th {
      font-weight: 700;
      color: var(--fg);
      border-bottom: 1px solid var(--border);
    }
    .ms-card thead th.dead {
      background: var(--halved);
      color: var(--muted);
    }
    .ms-card td.win {
      background: #d6f1da;
      color: #1f5a2a;
      font-weight: 800;
      border-radius: 4px;
    }
    @media (prefers-color-scheme: dark) {
      .ms-card td.win { background: #1f4628; color: #c7f0cf; }
    }
    /* Stroke indicator — 1-2 red dots in the cell, mirrors the mobile
       scorecard.  The template still emits the raw stroke count inside
       .strk; CSS hides it and paints dots before it instead so older
       payloads keep working. */
    .ms-card td .strk {
      display: inline-block;
      font-size: 0;            /* hide the numeric content */
      line-height: 0;
      vertical-align: super;
      margin-left: 2px;
    }
    .ms-card td .strk::before {
      content: '•';
      color: #c0392b;
      font-size: 10px;
      line-height: 1;
    }
    .ms-card td .strk[data-strokes="2"]::before {
      content: '••';
      letter-spacing: -1px;
    }
    .ms-card td .strk[data-strokes="3"]::before {
      content: '•••';
      letter-spacing: -1px;
    }
    .ms-card td.win .strk::before { color: #1f5a2a; }

    /* Four Ball progress grid — "Won by" row.  Renders T1/T2/= with
       the matching team-colour swatch so the eye can scan the row and
       see momentum across the round. */
    .ms-card tr.fb-wonby td {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.2px;
    }
    .ms-card td.fb-won-t1 {
      background: var(--t1-bg);
      color: var(--t1-fg);
    }
    .ms-card td.fb-won-t2 {
      background: var(--t2-bg);
      color: var(--t2-fg);
    }
    .ms-card td.fb-won-halved {
      color: var(--muted);
    }

    /* Points 5-3-1 leaderboard rows: name · running points · money. */
    .p531-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px; align-items: baseline;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    .p531-row:first-of-type { border-top: none; }
    .p531-row .name    { font-weight: 600; font-size: 14px; }
    .p531-row .name .phcp-inline {
      color: var(--muted); font-weight: 400; font-size: 12px;
      margin-left: 2px;
    }
    .p531-row .pts     { font-size: 13px; font-variant-numeric: tabular-nums; }
    .p531-row .delta   {
      font-weight: 700; font-size: 13px;
      font-variant-numeric: tabular-nums;
      min-width: 64px; text-align: right;
      color: var(--muted);
    }
    .p531-row .delta.up   { color: #1f8a3a; }
    .p531-row .delta.down { color: #c0392b; }

    /* Per-hole points row sits directly under each player's score row
       — paired pair with the same hole grid.  Lighter weight so the
       gross-score row still dominates visually. */
    .p531-card tr.p531-points-row td {
      color: var(--primary);
      font-weight: 700;
      font-size: 10px;
      padding-top: 0;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .p531-card tr.p531-points-row td.win {
      background: #d6f1da;
      color: #1f5a2a;
      border-radius: 4px;
    }
    .p531-card tr.p531-score-row td {
      border-bottom: none;
    }
    @media (prefers-color-scheme: dark) {
      .p531-card tr.p531-points-row td.win {
        background: #1f4628; color: #c7f0cf;
      }
    }

    /* Six's — one row per segment (Match 1 / 2 / 3) with the score
       text on the right and the team composition as a subtitle. */
    .sixes-seg {
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }
    .sixes-seg:first-of-type { border-top: none; }
    .sixes-seg-line {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    .sixes-seg-line .label  { font-weight: 600; font-size: 14px; }
    .sixes-seg-line .score  {
      font-weight: 700; font-size: 14px;
      font-variant-numeric: tabular-nums;
      color: var(--primary);
    }
    .sixes-seg-line .score.sixes-status-pending     { color: var(--muted); font-weight: 500; }
    .sixes-seg-line .score.sixes-status-in_progress { color: var(--muted); font-weight: 600; }
    .sixes-seg-line .score.halved                   { color: var(--muted); }
    .sixes-seg-sub {
      color: var(--muted); font-size: 12px;
      margin-top: 2px;
    }
    /* Leader of an in-progress / completed Six's segment — bold and
       tinted with the primary colour so the eye can scan the segment
       list and see who's winning each match. */
    .sixes-seg-sub .sixes-leader  {
      color: var(--primary);
      font-weight: 700;
    }
    .sixes-seg-sub .sep,
    .sixes-seg-sub .sixes-trailer { color: var(--muted); font-weight: 400; }
    .sixes-seg-sub.tone-won .sixes-leader {
      /* Won matches keep the same emphasis as leading ones — same
         green primary — so the visual treatment is consistent. */
    }
    .sixes-seg-sub.tone-halved,
    .sixes-seg-sub.tone-pending { color: var(--muted); }
    .sixes-money-head {
      font-weight: 700; font-size: 13px;
      margin-bottom: 4px;
    }
    .sixes-money-row {
      display: flex; justify-content: space-between;
      padding: 2px 0; font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .sixes-money-row .amount        { font-weight: 700; color: var(--muted); }
    .sixes-money-row .amount.up     { color: #1f8a3a; }
    .sixes-money-row .amount.down   { color: #c0392b; }

    /* Red/Pink Ball — lost-row gets muted text + a tinted status pill
       so the eye can scan the table and spot which groups are out. */
    .lb-table tr.lost-row td        { color: var(--muted); }
    .rb-lost {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      background: #f8e1e1;
      color: #b03030;
      font-weight: 700;
      font-size: 12px;
    }
    /* "/each" suffix on per-player payout cells — keep the dollar
       amount prominent, mute the suffix so the eye reads it as a
       qualifier, not part of the number. */
    .lb-table td .each {
      color: var(--muted);
      font-weight: 400;
      font-size: 10px;
      margin-left: 1px;
    }
    @media (prefers-color-scheme: dark) {
      .rb-lost { background: #3a1c1c; color: #f4b9b9; }
    }
    @media (prefers-color-scheme: dark) {
      .ms-card td .strk::before     { color: #f38a7d; }
      .ms-card td.win .strk::before { color: #c7f0cf; }
    }
    .ms-legend {
      color: var(--muted); font-size: 11px;
      margin: 6px 0 0 0;
      text-align: right;
    }
    .ms-legend .win-swatch {
      display: inline-block;
      width: 10px; height: 10px;
      background: #d6f1da;
      border: 1px solid #1f5a2a44;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── Low Net cards ──────────────────────────────────────────────── */
    .ln-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 0 0 6px 0;
    }
    .ln-card[open]                 { padding-bottom: 6px; }
    .ln-card-static                { padding-right: 0; }
    .ln-summary {
      display: grid;
      grid-template-columns: 28px 1fr auto auto 32px;
      gap: 8px; align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      list-style: none;
    }
    .ln-card-static .ln-summary    { cursor: default; }
    .ln-summary::-webkit-details-marker { display: none; }
    .ln-rank {
      font-weight: 700; font-variant-numeric: tabular-nums;
      text-align: center; color: var(--muted); font-size: 13px;
    }
    .ln-name        { font-weight: 600; font-size: 14px; }
    .ln-name .hcp   { color: var(--muted); font-weight: 400; font-size: 12px; }
    .ln-thru        { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .ln-ntp        {
      font-weight: 700; font-size: 16px;
      font-variant-numeric: tabular-nums; min-width: 32px; text-align: right;
    }
    .ln-chev        {
      color: var(--primary); font-size: 22px; line-height: 1;
      font-weight: 700;
      transition: transform 150ms ease;
      text-align: center;
    }
    .ln-card[open] .ln-chev { transform: rotate(180deg); }

    .ln-body        { padding: 4px 12px 4px 12px; border-top: 1px solid var(--border); }
    .round-label   {
      font-size: 11px; color: var(--primary); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      margin: 8px 0 4px 0;
    }

    /* ── Nine-hole scorecard grids ──────────────────────────────────── */
    .sc-grids {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin: 6px 0 4px 0;
    }
    .nine-label {
      font-size: 10px; color: var(--primary); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      margin-bottom: 2px;
    }
    table.nine {
      width: 100%; border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    table.nine th, table.nine td {
      text-align: center; padding: 2px 0;
      font-size: 11px; line-height: 1.2;
    }
    table.nine th {
      color: var(--muted); font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    table.nine tr.nine-tot td {
      font-weight: 700; border-top: 1px solid var(--border);
    }
    /* Stroke-index column — visually quieter than gross/net so the eye
       lands on actual scores first. */
    table.nine th.si, table.nine td.si {
      color: var(--muted);
      font-style: italic;
      font-size: 10px;
    }
    .under  { color: #1f8a3a; }
    .over   { color: #c0392b; }
    @media (prefers-color-scheme: dark) {
      .under { color: #6fd58a; }
      .over  { color: #f38a7d; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% if tabs|length > 1 %}
      <nav class="tabnav">
        {% for tab in tabs %}
          <a href="{{ tab.url }}"{% if tab.active %} class="active"{% endif %}>{{ tab.label }}</a>
        {% endfor %}
      </nav>
    {% endif %}
    {% block body %}{% endblock %}
    <div class="footer">
      <span id="refresh-status">Auto-refresh every {{ refresh_secs|default:30 }}s</span>
      <button type="button" id="refresh-toggle" class="refresh-btn">Pause</button>
    </div>
  </div>
  <script>
    (function () {
      var secs   = {{ refresh_secs|default:30 }};
      var status = document.getElementById('refresh-status');
      var btn    = document.getElementById('refresh-toggle');
      var timer  = null;
      var paused = false;

      function start() {
        if (timer) return;
        timer = setTimeout(function () { location.reload(); }, secs * 1000);
      }
      function stop() {
        if (!timer) return;
        clearTimeout(timer);
        timer = null;
      }
      function apply() {
        if (paused) {
          stop();
          status.textContent = 'Auto-refresh paused';
          btn.textContent    = 'Resume';
        } else {
          start();
          status.textContent = 'Auto-refresh every ' + secs + 's';
          btn.textContent    = 'Pause';
        }
      }
      btn.addEventListener('click', function () { paused = !paused; apply(); });
      apply();
    })();
  </script>
</body>
</html>
