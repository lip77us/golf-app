name: golf_mobile
description: Golf group scorecard and games app.
version: 1.7.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Persistent storage (auth token)
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Offline queue — local SQLite storage
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.4.0+2   # Desktop (macOS / Windows / Linux) support
  path: ^1.9.0

  # Connectivity monitoring (offline detection)
  connectivity_plus: ^6.0.5

  # Native share sheet for the "Invite Friends" link (user sends it from
  # their own phone → TCPA / App Store safe).
  share_plus: ^10.1.4

  # Renders the Halved brand mark (SVG) inline — e.g. the "On Halved"
  # connected-golfer badge.
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Generates the iOS app-icon set from a single 1024×1024 source.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/halved_icon.png
    - assets/icon/halved_mark.svg

# App-icon generation. Swap image_path to the final cut-ball logo later,
# then re-run:  dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/halved_icon.png"
  ios: true
  android: false          # iPhone-only for v1
  remove_alpha_ios: true  # iOS icons must be opaque (no alpha channel)
