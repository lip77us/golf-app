name: golf_mobile
description: Golf group scorecard and games app.
version: 2.3.2+14

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Persistent storage (auth token)
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Offline queue — local SQLite storage
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.4.0+2   # Desktop (macOS / Windows / Linux) support
  path: ^1.9.0

  # Connectivity monitoring (offline detection)
  connectivity_plus: ^6.0.5

  # Native share sheet for the "Invite Friends" link (user sends it from
  # their own phone → TCPA / App Store safe).
  share_plus: ^10.1.4

  # Reads the app's real version from the bundle at runtime so Config.appVersion
  # can never drift from pubspec (drove the About-shows-2.2.0 + force-upgrade bug).
  package_info_plus: ^8.0.0

  # Opens Messages with a pre-filled recipient + body (sms: deep link) so the
  # user can one-tap an invite to a golfer they just added. Sent from their own
  # phone → TCPA / App Store safe.
  url_launcher: ^6.3.1

  # In-app SMS composer (MFMessageComposeViewController on iOS). Used for golfer
  # invites so the Messages compose UI appears as a sheet OVER Halved and
  # dismisses back to the app automatically on send/cancel — no app switch, no
  # "Halved" top-left back tap (unlike the url_launcher sms: external launch).
  flutter_sms: ^3.0.1

  # iOS/Android universal-link handling. Taps on https://halved.golf/watch/...
  # open the app (Associated Domains + apple-app-site-association) and are
  # routed to the read-only leaderboard for that round.
  app_links: ^6.3.2

  # Renders the Halved brand mark (SVG) inline — e.g. the "On Halved"
  # connected-golfer badge.
  flutter_svg: ^2.0.16
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # Brand typefaces (Schibsted Grotesk + Spline Sans) per the Halved brand
  # guidelines. Fetched/cached at runtime; used on the redesigned screens.
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Generates the iOS app-icon set from a single 1024×1024 source.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/halved_icon.png
    - assets/icon/halved_mark.svg

# App-icon generation. Swap image_path to the final cut-ball logo later,
# then re-run:  dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/halved_icon.png"
  ios: true
  android: false          # iPhone-only for v1
  remove_alpha_ios: true  # iOS icons must be opaque (no alpha channel)
